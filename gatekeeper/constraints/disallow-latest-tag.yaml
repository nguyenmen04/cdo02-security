# Constraint 1: Cấm image tag :latest
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sDisallowedTagsV2
metadata:
  name: disallow-latest-tag
spec:
  enforcementAction: deny  # deny = enforce, warn = audit
  match:
    excludedNamespaces:
    - kube-system
    - gatekeeper-system
    - monitoring
    - argocd
    kinds:
    - apiGroups: [""]
      kinds: ["Pod"]
    - apiGroups: ["apps"]
      kinds: ["Deployment", "StatefulSet", "DaemonSet", "ReplicaSet"]
    - apiGroups: ["argoproj.io"]
      kinds: ["Rollout"]
  parameters:
    tags:
    - "latest"
