# ConstraintTemplate: Cấm sử dụng hostNetwork: true
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sdisallowhostnetwork
  annotations:
    description: Cấm pods sử dụng host network để tránh rủi ro bảo mật
spec:
  crd:
    spec:
      names:
        kind: K8sDisallowHostNetwork
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sdisallowhostnetwork

        violation[{"msg": msg}] {
          input.review.object.spec.hostNetwork
          msg := "Using hostNetwork: true is not allowed"
        }

        violation[{"msg": msg}] {
          input.review.object.spec.template.spec.hostNetwork
          msg := "Using hostNetwork: true in Pod template is not allowed"
        }
