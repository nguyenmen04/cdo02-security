# Test deployment vi phạm: sử dụng hostNetwork - PHẢI REJECT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-invalid-hostnet
  namespace: demo
  labels:
    owner: team-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-invalid
  template:
    metadata:
      labels:
        app: test-invalid
        owner: team-platform
    spec:
      hostNetwork: true  # ❌ Vi phạm: Sử dụng host network
      securityContext:
        runAsUser: 1000
      containers:
      - name: app
        image: nginx:1.21.6
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
