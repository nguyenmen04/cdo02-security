# Test deployment vi phạm: không có resources.limits - PHẢI REJECT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-invalid-no-limits
  namespace: demo
  labels:
    owner: team-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-invalid
  template:
