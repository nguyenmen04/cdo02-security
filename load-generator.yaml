apiVersion: v1
kind: Pod
metadata:
  name: load-generator
  namespace: demo
  labels:
    owner: team-platform
spec:
  securityContext:
    runAsUser: 1000
    runAsNonRoot: true
  containers:
  - name: load-generator
    image: busybox:1.36.1
    command: ["/bin/sh", "-c", "while true; do wget -q -O- http://api.demo.svc.cluster.local:80/; sleep 0.1; done"]
    resources:
      limits:
        cpu: 100m
        memory: 64Mi
