# ArgoCD Application: Install Gatekeeper controller
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper-system
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"  # Deploy trước tất cả
spec:
  project: default
  source:
    repoURL: https://open-policy-agent.github.io/gatekeeper/charts
    chart: gatekeeper
    targetRevision: 3.15.1
    helm:
      values: |
        replicas: 1
        audit:
          interval: 60
  destination:
    server: https://kubernetes.default.svc
    namespace: gatekeeper-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
