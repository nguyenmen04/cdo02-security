apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: payments-admin
  namespace: payments
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: payments-admin-binding
  namespace: payments
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: payments-admin
subjects:
  - kind: User
    name: team-payments
